<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte Postale 3D</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>

  <div id="wrap">
    <div id="scene">
      <div id="card">
        <div class="face">
          <img id="img-recto" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1120&q=80" alt="recto"/>
        </div>
        <div class="face back">
          <img id="img-verso" src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=1120&q=80" alt="verso"/>
        </div>
      </div>
    </div>
    <div id="hint">Glisser pour orienter · Cliquer pour retourner</div>
    <button id="flipbtn">Retourner la carte</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
