<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Wait and see</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/main.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="stylesheet" href="./css/scroll-buddy.css" />
  </head>
  <script src="./js/scroll-buddy.js"></script>
  <body>
    <div id="scroll-buddy"></div>
    <!-- Page de chargement -->
    <div class="loading-page">
      <h2 class="first-title">Prenez le temps de regarder et vous verrez...</h2>
      <h2 class="second-title">Hayao Miysaki</h2>
      <img
        src="./images/cloud-top-left.png"
        alt="cloud"
        class="cloud-top-left undraggable"
      />
      <img
        src="./images/cloud-top-right.png"
        alt="cloud"
        class="cloud-top-right undraggable"
      />
      <img
        src="./images/cloud-bottom-left.png"
        alt="cloud"
        class="cloud-bottom-left undraggable"
      />
      <img
        src="./images/cloud-bottom-right.png"
        alt="cloud"
        class="cloud-bottom-right undraggable"
      />
    </div>

    <!-- Contenu de la page -->
    <div class="content">
      <div class="scrollTriggerEnveloppe">
        <img src="./images/desk.jpg" alt="desk" class="desk-2 undraggable" />

        <!-- Enveloppe -->

        <div class="enveloppe-container">
          <div class="topEnveloppe">
            <img
              src="images/cachet.png"
              alt="image enveloppe"
              class="stamp undraggable"
            />
            <img
              src="images/front-enveloppe.png"
              alt="image enveloppe"
              class="front-enveloppe undraggable"
            />
            <img
              src="images/dessus-enveloppe.png"
              alt="image enveloppe"
              class="open-enveloppe undraggable"
            />
          </div>
          <!-- Card -->
          <div id="wrap">
            <div id="scene">
              <div id="card4">
                <div class="face">
                  <img
                    id="img-recto"
                    src="./images/letters/letter-chihiro-front.png"
                    alt="recto"
                  />
                </div>
                <div class="face back">
                  <img
                    id="img-verso"
                    src="./images/letters/letter-chihiro-back.png"
                    alt="verso"
                  />
                </div>
              </div>
              <div id="card5">
                <div class="face">
                  <img
                    id="img-recto"
                    src="./images/letters/letter-heron-front.png"
                    alt="recto"
                  />
                </div>
                <div class="face back">
                  <img
                    id="img-verso"
                    src="./images/letters/letter-heron-back.png"
                    alt="verso"
                  />
                </div>
              </div>
              <div id="card3">
                <div class="face">
                  <img
                    id="img-recto"
                    src="./images/letters/letter-monoké-front.png"
                    alt="recto"
                  />
                </div>
                <div class="face back">
                  <img
                    id="img-verso"
                    src="./images/letters/letter-mononoke-back.png"
                    alt="verso"
                  />
                </div>
              </div>
              <div id="card">
                <div class="face">
                  <img
                    id="img-recto"
                    src="./images/letters/letter-nausicaa-front.png"
                    alt="recto"
                  />
                </div>
                <div class="face back">
                  <img
                    id="img-verso"
                    src="./images/letters/letter-nausicaa-back.png"
                    alt="verso"
                  />
                </div>
              </div>
              <div id="card2">
                <div class="face">
                  <img
                    id="img-recto"
                    src="./images/letters/letter-totoro-front.png"
                    alt="recto"
                  />
                </div>
                <div class="face back">
                  <img
                    id="img-verso"
                    src="./images/letters/letter-totoro-back.png"
                    alt="verso"
                  />
                </div>
              </div>
            </div>
            <div id="hint">Glisser pour orienter · Cliquer pour retourner</div>
            <button id="flipbtn">Retourner la carte</button>
          </div>
          <div class="backgroudEnveloppe">
            <img
              src="images/background-enveloppe.png"
              alt="image enveloppe"
              class="background-enveloppe undraggable"
            />
          </div>
        </div>
      </div>
      <div class="transition">
        <video autoplay muted id="transition-video">
          <source src="./vid/eyes_00000.mov" />
        </video>
      </div>
      <div class="scrollTriggerNext"></div>

      <div id="loupe"></div>

      <div class="image-container">
        <img src="./images/landscape.png" alt="Landscape" id="landscape" />
        <img
          id="landscape-2"
          src="./images/landscape-2.png"
          alt="Landscape 2"
          class="undraggable"
        />
      </div>
    </div>
    <script src="js/main.js" type="module"></script>
  </body>
</html>
